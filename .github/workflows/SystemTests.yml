
name: SystemTests
on:
  pull_request:
    branches:
      - main
  schedule:
    # Trigger on start of the day every working day (stolen from player nightly)
    - cron: '0 0 * * MON-FRI'
  workflow_dispatch:

jobs:
  # Runs instrumented tests on a Pixel 6 API 35 emulator.
  # All four modules run in parallel via matrix to minimise total wall-clock time.
  system-tests:
    # This condition is necessary to avoid having an endless search for the bitdash runner occurring on the public repo which is not part of the bitmovin-engineering organization.
    # Furthermore, we only needs these checks internally.
    # Linked ticket: https://bitmovin.atlassian.net/browse/AN-4297
    # You can obtain this id by running the following command in the terminal while being on the repository page:
    # $("meta[name=octolytics-dimension-repository_id]").getAttribute('content')
    if: github.repository_id == 310696148
    # This job cannot run on the default runner, as it requires many resources.
    runs-on: bitdash-4core
    timeout-minutes: 60
    strategy:
      # Keep running all modules even if one fails, so we get a full picture of failures.
      fail-fast: false
      matrix:
        module:
          - collector
          - collector-bitmovin-player
          - collector-theoplayer
          - collector-media3-exoplayer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Allow access to Test Sources
        env:
          S3_AUTHORIZE_KEY: ${{ secrets.S3_AUTHORIZE_KEY }}
        run: |
          curl --ipv4 "https://us-central1-bitmovin-api.cloudfunctions.net/authorizeS3Bucket?key=$S3_AUTHORIZE_KEY"

      - name: Run Tests - ${{ matrix.module }}
        run: |
          ./gradlew :${{ matrix.module }}:pixel6api35DebugAndroidTest

      - name: Upload Test Results - ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.module }}
          path: ${{ matrix.module }}/build/outputs/androidTest-results/managedDevice/debug/pixel6api35/

      - name: Upload Test Reports - ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/androidTests/managedDevice/debug/pixel6api35/

  report:
    needs: system-tests
    if: always() && github.repository_id == 310696148
    runs-on: bitdash-4core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-results
          merge-multiple: false

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: test-reports
          merge-multiple: false

# Create Report which can be analyzed in the github ui directly
      - name: Publish SystemTest Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results/**/TEST-*.xml'

      - name: Combine Reports
        if: always()
        id: copy-reports
        run: |
            mkdir reports

            cp -r test-reports/test-reports-collector/ reports/collector
            cp -r test-reports/test-reports-collector-bitmovin-player/ reports/collector-bitmovin-player
            cp -r test-reports/test-reports-collector-media3-exoplayer/ reports/collector-media3-exoplayer
            cp -r test-reports/test-reports-collector-theoplayer/ reports/collector-theoplayer

            cp .github/tests-report/INDEX_TEST_REPORTS.html reports/index.html

            ./.github/tests-report/report_enhancer.sh reports

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tests-report
          path: reports

      # If it fails on the main branch, send a slack message (merged PR or nightly tests)
      - name: Send a Slack message whenever the tests fails on the main branch
        if: failure() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v1
        with:
          # The Slack Webhook URL only takes one parameter which is the link to the failed action.
          payload: |
            {
              "failedActionUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
